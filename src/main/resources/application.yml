spring:
  application:
    name: retailflow-event-intelligence-platform
  datasource:
    url: jdbc:postgresql://localhost:5432/retailflow_events
    username: app
    password: app

  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false

  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: retailflow-event-intelligence
      auto-offset-reset: earliest
      properties:
        spring.json.trusted.packages: com.retailflow.event_intelligence
    producer:
      properties:
        spring.json.add.type.headers: false

  data:
    redis:
      host: localhost
      port: 6379

  cache:
    type: redis
    redis:
      time-to-live: 5m


server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always
