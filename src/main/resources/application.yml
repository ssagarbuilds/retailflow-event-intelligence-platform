spring:
  application:
    name: retailflow-event-intelligence-platform
  datasource:
    url: jdbc:postgresql://localhost:5432/retailflow_events
    username: app
    password: app

  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
  kafka:
    bootstrap-servers: localhost:9092
  data:
    redis:
      host: localhost
      port: 6379
  cache:
    type: redis
    redis:
      time-to-live: 5m


server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always
